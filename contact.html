    <main class="contact-container">
        <header class="section-header">
            <h1>Get In Touch</h1>
            <p>Have a question about my Equity research models or want to discuss Fintech? Drop a message.</p>
        </header>

        <div class="contact-wrapper">
            <section class="contact-form-section">
                <form action="#" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="Topic" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="7" placeholder="Your Message" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </section>

            <section class="contact-info">
                <div class="info-item">
                    <h3>Email</h3>
                    <p>i235558@isb.nu.edu.pk</p>
                </div>
                <div class="info-item">

                </div>
                <div class="info-item">
                    <h3>Location</h3>

                </div>
            </section>
